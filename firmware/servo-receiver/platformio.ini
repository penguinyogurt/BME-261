; PlatformIO project for the servo-actuator ESP32 (the ESP-NOW *receiver*).
; It pairs with the EMG collection ESP32 in this repo, which will be the sender.
;
; Board on hand: ESP32-D0WD-V3 devkit, CP210x bridge, enumerates as COM7.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = COM7
monitor_port = COM7
